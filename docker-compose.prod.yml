services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: postgres_pgvector
    restart: always
    environment:
      POSTGRES_USER: Abdel
      POSTGRES_PASSWORD: TestOrra
      POSTGRES_DB: n8n_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_storage:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    container_name: ollama-regista
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_storage:/root/.ollama

  regista-postgres:
    image: postgres:16-alpine
    container_name: regista-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: regista
      POSTGRES_PASSWORD: "dm03c&DNHMsIuQlD"
      POSTGRES_DB: regista_agency
    volumes:
      - regista_postgres_data:/var/lib/postgresql/data
    networks:
      - regista-network

  regista-nextjs:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: regista-nextjs-prod
    restart: always
    depends_on:
      - regista-postgres
    environment:
      - DATABASE_URL=postgresql://regista:dm03c%26DNHMsIuQlD@regista-postgres:5432/regista_agency
      - NEXTAUTH_URL=https://demo.regista-agency.com
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
    networks:
      - regista-network
      - traefik-proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=root_traefik-proxy
      - traefik.http.routers.regista.rule=Host(`demo.regista-agency.com`)
      - traefik.http.routers.regista.tls=true
      - traefik.http.routers.regista.entrypoints=websecure
      - traefik.http.routers.regista.tls.certresolver=mytlschallenge
      - traefik.http.services.regista.loadbalancer.server.port=3000

volumes:
  traefik_data:
    external: true
  postgres_storage:
  ollama_storage:
  regista_postgres_data:

networks:
  regista-network:
  traefik-proxy:
    external: true
    name: root_traefik-proxy
