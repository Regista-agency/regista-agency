services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: regista-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-regista}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: regista_agency
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - regista-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-regista} -d regista_agency"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js Application (Production)
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Regista Agency}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://demo.regista-agency.fr}
    container_name: regista-nextjs-prod
    restart: always
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXT_PUBLIC_APP_NAME=${NEXT_PUBLIC_APP_NAME}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - regista-network

volumes:
  postgres_data:
    driver: local

networks:
  regista-network:
    driver: bridge
